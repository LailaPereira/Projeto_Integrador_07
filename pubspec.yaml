name: vision_guide
description: VisionGuide - Sistema inteligente de navegação assistiva
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  go_router: ^14.0.0
  provider: ^6.0.0
  camera: ^0.10.0
  permission_handler: ^11.0.0
  flutter_tts: ^8.0.0
  speech_to_text: ^6.1.0
  flutter_blue_plus: ^1.28.0
  web_socket_channel: ^3.0.0
  http: ^1.1.0
  flutter_svg: ^2.0.0
  cupertino_icons: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/google.png
    - assets/images/background_pattern.png
